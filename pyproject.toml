[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "granola-mcp-server"
version = "1.2.0"
description = "MCP server for Granola.ai meeting intelligence"
readme = "README.md"
license = "MIT"
authors = [{name = "Proof+Geist", email = "ernest.koe@proofgeist.com"}]
requires-python = ">=3.12"
keywords = ["mcp", "granola", "meetings", "ai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "mcp>=1.0.0",
    "pydantic>=2.0.0",
    "typing-extensions>=4.0.0; python_version < '3.13'",
]

[project.urls]
Homepage = "https://github.com/proofgeist/granola-mcp-server"
Repository = "https://github.com/proofgeist/granola-mcp-server"
Issues = "https://github.com/proofgeist/granola-mcp-server/issues"

[project.scripts]
granola-mcp-server = "granola_mcp_server.server:main"

[tool.semantic_release]
version_toml = ["pyproject.toml:project.version"]
commit_message = "{version}\n\nAutomatically generated by python-semantic-release"
major_on_zero = false
build_command = "pip install build && python -m build"